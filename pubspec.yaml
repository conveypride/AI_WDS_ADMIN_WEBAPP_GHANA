name: weather_admin_dashboard
description: A comprehensive web-based admin dashboard for managing weather notifications, forecasts, and alerts.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies
  cupertino_icons: ^1.0.8
  
  # State Management & Routing
  get: ^4.6.6
  
  # HTTP & API
  http: ^1.2.0
  
  # Maps
  google_maps_flutter: ^2.5.0
  google_maps_flutter_web: ^0.5.4
  
  # Icons: phosphor_flutter removed. Its final release (2.1.0, 2023) extends
  # IconData, which Flutter 3.44 made a `final` class, so it no longer compiles
  # and there is no fixed version to upgrade to. lib/app/theme/phosphor_icons.dart
  # is a drop-in replacement backed by Flutter's built-in Material icons.

  # Charts
  fl_chart: ^1.1.1
  
  # Date & Time
  intl: ^0.20.2
  
  # Rich Text Editor (removed flutter_quill due to version conflict)
  # You can add it back later if needed with: flutter_quill: ^10.0.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_quill: ^11.5.0
  printing: ^5.14.2
  path_provider: ^2.1.5
  open_file: ^3.5.11
  latlong2: ^0.9.1
  flutter_map: ^8.2.2
  pdf: ^3.11.3
  # Pinned below 2.4.6: newer pdfrx pulls image ^4.8.0, which conflicts with excel 4.0.6's archive/xml constraints.
  pdfrx: ^2.4.5
  # The pure-Dart engine underneath pdfrx. Depended on directly so the bulletin
  # parser (cafo_pdf_import_service.dart) stays free of Flutter imports.
  pdfrx_engine: ^0.4.4
  google_fonts: ^8.0.1
  excel: ^4.0.6
  file_picker: ^10.3.10
  web: ^1.1.1
  csv: ^8.0.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  url_launcher: ^6.3.2
  firebase_storage: ^13.3.0
  geolocator: ^14.0.2
  record: ^6.2.0
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  
  # Uncomment if you add custom assets
  assets:
    - assets/images/
    - assets/data/geoBoundaries-GHA-ADM0.geojson
    - assets/data/marineRegionsEEZ.geojson
    - assets/data/lake_volta.geojson
    - assets/fonts/Tinos-Regular.ttf
    - assets/fonts/Tinos-Bold.ttf
    - assets/fonts/Tinos-BoldItalic.ttf
    - assets/fonts/Tinos-Italic.ttf
  #   - assets/icons/